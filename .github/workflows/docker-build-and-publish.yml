---
name: Create and publish a Docker image for every release

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_GALAXY: fortytwoservices/clientid-operator

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Extract metadata (tags, labels) for container
      # if the event that triggered the workflow is a release
      - name: Release Galaxy, Extract metadata (tags, labels)
        id: meta_release_galaxy
        if: github.event_name == 'release'
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_GALAXY }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      # Build and push the Docker image
      # if the event that triggered the workflow is a release
      - name: Release Galaxy, Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        if: github.event_name == 'release'
        with:
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta_release_galaxy.outputs.tags }}
          labels: ${{ steps.meta_release_galaxy.outputs.labels }}
          annotations: ${{ steps.meta_release_galaxy.outputs.annotations }}
          outputs: type=image,oci-mediatypes=true
